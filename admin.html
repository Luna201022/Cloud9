<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Cloud9 Admin – Menü</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Cloud9 Admin – Menü</h1>

  <div style="margin-bottom:20px;">
    <input type="password" id="pin" placeholder="PIN eingeben" />
    <button onclick="loadMenu()">Laden</button>
    <button onclick="saveMenu()">Speichern</button>
    <span id="msg" style="margin-left:15px;color:red;"></span>
  </div>

  <textarea id="editor" style="width:100%;height:500px;"></textarea>

<script>
const api = "/api/menu";   // ← FIXED

function getPin() {
  return document.getElementById("pin").value;
}

async function loadMenu() {
  document.getElementById("msg").textContent = "";
  try {
    const res = await fetch(api, {
      headers: {
        "Authorization": "Bearer " + getPin()
      }
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const data = await res.text();
    document.getElementById("editor").value = data;
  } catch (e) {
    document.getElementById("msg").textContent =
      "Fehler beim Laden: " + e.message;
  }
}

async function saveMenu() {
  document.getElementById("msg").textContent = "";
  try {
    const content = document.getElementById("editor").value;

    JSON.parse(content); // validieren

    const res = await fetch(api, {
      method: "PUT",
      headers: {
        "Authorization": "Bearer " + getPin(),
        "Content-Type": "application/json"
      },
      body: content
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    document.getElementById("msg").style.color = "green";
    document.getElementById("msg").textContent = "Gespeichert.";
  } catch (e) {
    document.getElementById("msg").style.color = "red";
    document.getElementById("msg").textContent =
      "Fehler beim Speichern: " + e.message;
  }
}
</script>

</body>
</html>
