<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloud9 Admin – Menü</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#0b1117; color:#e6edf3; margin:0; padding:16px; }
    h1 { margin-bottom: 8px; }
    .row { display:flex; gap:8px; margin-bottom:8px; }
    input, button, textarea { padding:8px; border-radius:6px; border:1px solid #2d3b45; background:#0f1720; color:#e6edf3; }
    textarea { width:100%; min-height:300px; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
  </style>
</head>
<body>
  <h1>Cloud9 – Admin Menü</h1>

  <div class="row">
    <input id="pin" type="password" placeholder="ADMIN PIN" />
    <button onclick="loadMenu()">Laden</button>
    <button onclick="saveMenu()">Speichern</button>
  </div>

  <p id="status"></p>

  <textarea id="json"></textarea>

  <script>
    const api = "/api/admin/menu";
    const statusEl = document.getElementById("status");
    const jsonEl = document.getElementById("json");
    const pinEl = document.getElementById("pin");

    function setStatus(msg, ok=true){
      statusEl.textContent = msg;
      statusEl.className = ok ? "ok" : "err";
    }

    async function loadMenu(){
      setStatus("Lade Menü...");
      const pin = pinEl.value.trim();
      if(!pin) return setStatus("PIN fehlt", false);

      const res = await fetch(api, {
        headers: { "Authorization": "Bearer " + pin }
      });

      if(!res.ok){
        return setStatus("Fehler beim Laden: " + res.status, false);
      }
      const txt = await res.text();
      jsonEl.value = txt;
      setStatus("Menü geladen");
    }

    async function saveMenu(){
      setStatus("Speichere...");
      const pin = pinEl.value.trim();
      if(!pin) return setStatus("PIN fehlt", false);

      // einfacher JSON-Check
      try { JSON.parse(jsonEl.value); } catch(e){
        return setStatus("Ungültiges JSON", false);
      }

      const res = await fetch(api, {
        method: "PUT",
        headers: {
          "Authorization": "Bearer " + pin,
          "Content-Type": "application/json"
        },
        body: jsonEl.value
      });

      if(!res.ok){
        return setStatus("Fehler beim Speichern: " + res.status, false);
      }
      setStatus("Gespeichert ✔");
    }
  </script>
</body>
</html>
