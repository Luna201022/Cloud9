<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cloud9 Staff – Bestellungen</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:#0b1620;color:#e7eef6;margin:0;padding:18px}
    .top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    button{background:#1b2c3b;color:#e7eef6;border:1px solid #2b4257;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}
    button.danger{background:#3b1b1b;border-color:#5a2b2b}
    .muted{opacity:.75;font-size:12px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-top:12px}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .h{font-size:18px;font-weight:900}
    .status{font-weight:900;padding:6px 10px;border-radius:10px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.10)}
    .note{margin-top:8px}
    ul{margin:10px 0 0 18px}
    .actions{margin-top:12px;gap:8px;flex-wrap:wrap}
    #err{color:#ffb4b4;margin-top:8px}
  </style>
</head>
<body>
  <div class="top">
    <div style="font-weight:900;font-size:20px">Cloud9 Staff – Bestellungen</div>
    <div class="muted">Anzahl: <span id="count">0</span></div>
    <button id="refresh">Neu laden</button>
    <button id="auto">Auto: AUS</button>
    <button id="pin">PIN ändern</button>
  </div>
  <div id="err"></div>
  <div id="orders"></div>

  <script src="staff.js"></script>
</body>
</html>
