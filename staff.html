<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cloud9 – Staff</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#07151f; --card:#0b2230; --muted:#9fb2bd; --text:#e8f1f5;
      --accent:#4cc0ff; --danger:#ff4c4c; --ok:#3ddc97;
      --border:rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{ margin:0; background:radial-gradient(1200px 800px at 20% 0%, rgba(76,192,255,.25), transparent 60%),
                          radial-gradient(900px 700px at 80% 20%, rgba(61,220,151,.18), transparent 60%),
                          var(--bg);
          color:var(--text); }
    header{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
      background: rgba(7,21,31,.7);
      border-bottom:1px solid var(--border);
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:14px 16px; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .brand{ font-weight:800; letter-spacing:.2px; }
    .pill{ display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--border);
           border-radius:999px; background:rgba(255,255,255,.04); }
    .btn{
      border:1px solid var(--border); background:rgba(255,255,255,.06);
      color:var(--text); border-radius:12px; padding:10px 12px;
      cursor:pointer; font-weight:650;
    }
    .btn.primary{ border-color:rgba(76,192,255,.55); background:rgba(76,192,255,.14); }
    .btn.danger{ border-color:rgba(255,76,76,.55); background:rgba(255,76,76,.12); }
    .btn:active{ transform: translateY(1px); }
    .grid{ display:grid; grid-template-columns: 1fr; gap:12px; padding:16px; max-width:1100px; margin:0 auto; }
    .card{ background:rgba(11,34,48,.85); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); }
    .card .hd{ padding:14px 14px 0 14px; display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .card .bd{ padding:14px; }
    .muted{ color:var(--muted); font-size:13px; }
    .kpi{ display:flex; gap:10px; align-items:center; }
    .dot{ width:10px; height:10px; border-radius:999px; background:var(--muted); }
    .dot.ok{ background:var(--ok); }
    .dot.bad{ background:var(--danger); }
    .table{
      width:100%; border-collapse:collapse; font-size:14px;
    }
    .table th, .table td{
      border-top:1px solid var(--border);
      padding:10px 8px; vertical-align:top;
    }
    .table th{ text-align:left; color:var(--muted); font-weight:650; font-size:12px; text-transform:uppercase; letter-spacing:.7px; }
    .badge{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 8px; border-radius:999px; border:1px solid var(--border);
      background:rgba(255,255,255,.05); font-size:12px; color:var(--text);
    }
    .badge.new{ border-color:rgba(76,192,255,.55); background:rgba(76,192,255,.12); }
    .badge.done{ border-color:rgba(61,220,151,.55); background:rgba(61,220,151,.12); }
    .badge.other{ border-color:rgba(255,255,255,.12); background:rgba(255,255,255,.04); }
    .items{ display:flex; flex-direction:column; gap:6px; }
    .itemline{ display:flex; justify-content:space-between; gap:10px; }
    .right{ margin-left:auto; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:12px; }
    .empty{ padding:18px 14px; color:var(--muted); }
    .footer{ padding:18px 16px; color:var(--muted); font-size:12px; text-align:center; }
    .input{
      background:rgba(255,255,255,.05); border:1px solid var(--border);
      color:var(--text); border-radius:12px; padding:10px 12px; min-width:180px;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="row">
        <div class="brand">Cloud9 – Staff</div>
        <div class="pill" id="statusPill"><span class="dot" id="statusDot"></span><span id="statusText">Nicht verbunden</span></div>
        <div class="pill"><span class="muted">Orders:</span> <strong id="kpiCount">0</strong></div>
        <button class="btn primary" id="btnRefresh">Aktualisieren</button>
        <button class="btn" id="btnAuto">Auto: AN</button>
        <button class="btn" id="btnPin">PIN ändern</button>
        <button class="btn danger" id="btnLogout">Abmelden</button>
        <span class="right muted" id="lastUpdate">–</span>
      </div>
      <div class="row" style="margin-top:10px">
        <input class="input" id="filterTable" placeholder="Tisch filtern (z.B. 1)" inputmode="numeric" />
        <input class="input" id="filterText" placeholder="Text filtern (Artikel/Notiz)" />
      </div>
    </div>
  </header>

  <main class="grid">
    <div class="card">
      <div class="hd">
        <div>
          <div style="font-weight:800">Bestellungen</div>
          <div class="muted">Live-Übersicht. PIN wird nur lokal im Browser gespeichert (Session).</div>
        </div>
        <div class="kpi">
          <span class="badge new" id="kpiNew">NEU: 0</span>
          <span class="badge done" id="kpiDone">ERLEDIGT: 0</span>
        </div>
      </div>
      <div class="bd" id="ordersHost">
        <div class="empty">Noch keine Daten.</div>
      </div>
    </div>
  </main>

  <div class="footer">© Cloud9 • Staff-Ansicht</div>

  <script src="/staff.js"></script>
</body>
</html>
