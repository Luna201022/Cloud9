<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloud9 – Bestellungen (Staff)</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body{padding:18px}
    .wrap{max-width:1100px;margin:0 auto}
    .topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pin{max-width:180px}
    .pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);font-size:12px}
    .orders{margin-top:14px;display:flex;flex-direction:column;gap:12px}
    .orderCard{border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;background:rgba(0,0,0,.18)}
    .orderHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .orderHead h2{margin:0;font-size:18px}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .items{margin-top:10px}
    .items ul{margin:8px 0 0 18px}
    .btnRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .new{outline:2px solid rgba(80,200,120,.45)}
    .muted{opacity:.8}
    .danger2{border-color: rgba(220,70,70,.6)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="h">Cloud9 – Bestellungen (Staff)</div>
      <div class="topbar" style="margin-top:10px">
        <input class="input pin" id="pin" type="password" placeholder="PIN (ADMIN_PIN)" />
        <button class="btn primary" id="connect">Verbinden</button>
        <button class="btn" id="refresh">Aktualisieren</button>
        <label class="pill"><input type="checkbox" id="onlyNew" checked> nur NEW</label>
        <span class="pill" id="status">nicht verbunden</span>
      </div>
    </div>

    <div class="orders" id="orders"></div>
  </div>

<script>
(() => {
  const el = (id) => document.getElementById(id);
  let timer = null;
  let lastKeys = new Set();

  function authHeaders() {
    const pin = (el("pin").value || "").trim();
    return { "Authorization": "Bearer " + pin };
  }

  function fmtMoney(v) {
    const n = typeof v === "number" ? v : 0;
    return n.toFixed(2).replace(".", ",") + " €";
  }

  function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

  async function apiGet() {
    const onlyNew = el("onlyNew").checked ? "1" : "0";
    const res = await fetch("/api/staff/orders?onlyNew=" + onlyNew, { headers: authHeaders(), cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  async function apiSetStatus(key, status) {
    const res = await fetch("/api/staff/status", {
      method: "POST",
      headers: Object.assign({ "Content-Type":"application/json" }, authHeaders()),
      body: JSON.stringify({ key, status })
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  async function apiDelete(key) {
    const res = await fetch("/api/staff/delete", {
      method: "POST",
      headers: Object.assign({ "Content-Type":"application/json" }, authHeaders()),
      body: JSON.stringify({ key })
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  function render(data) {
    const host = el("orders");
    const orders = Array.isArray(data.orders) ? data.orders : [];
    if (!orders.length) {
      host.innerHTML = '<div class="card"><div class="small">Keine Bestellungen.</div></div>';
      return;
    }

    const nowKeys = new Set(orders.map(o => o.key));
    const newOnes = [];
    for (const k of nowKeys) if (!lastKeys.has(k)) newOnes.push(k);
    lastKeys = nowKeys;

    // small sound/beep when new orders arrive
    if (newOnes.length) {
      try { new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=").play().catch(()=>{}); } catch(e){}
    }

    host.innerHTML = orders.map(o => {
      const dt = o.createdAt ? new Date(o.createdAt) : null;
      const time = dt ? dt.toLocaleString() : "";
      const isNew = (o.status || "NEW") === "NEW";
      return `
        <div class="orderCard ${isNew ? "new" : ""}">
          <div class="orderHead">
            <div>
              <h2>Tisch ${esc(o.tableId ?? "?")} <span class="muted">• ${esc(o.status || "NEW")}</span></h2>
              <div class="meta">
                ${time ? `<span class="pill">${esc(time)}</span>` : ``}
                ${typeof o.total === "number" ? `<span class="pill">Summe: ${esc(fmtMoney(o.total))}</span>` : ``}
              </div>
            </div>
            <div class="btnRow">
              <button class="btn primary" data-done="${esc(o.key)}">Erledigt</button>
              <button class="btn danger" data-del="${esc(o.key)}">Löschen</button>
            </div>
          </div>
          <div class="items">
            <div class="small">Artikel:</div>
            <ul>
              ${(o.items || []).map(it => `<li>${esc(it.name || it.id)} x${esc(it.qty || 1)}</li>`).join("")}
            </ul>
            ${o.note ? `<div class="small" style="margin-top:8px"><b>Notiz:</b> ${esc(o.note)}</div>` : ``}
          </div>
        </div>
      `;
    }).join("");

    host.querySelectorAll("[data-done]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const key = btn.getAttribute("data-done");
        btn.disabled = true;
        try { await apiSetStatus(key, "DONE"); await refresh(); } catch(e){ alert(String(e.message||e)); }
        btn.disabled = false;
      });
    });
    host.querySelectorAll("[data-del]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const key = btn.getAttribute("data-del");
        if (!confirm("Wirklich löschen?")) return;
        btn.disabled = true;
        try { await apiDelete(key); await refresh(); } catch(e){ alert(String(e.message||e)); }
        btn.disabled = false;
      });
    });
  }

  async function refresh() {
    try {
      const data = await apiGet();
      el("status").textContent = "verbunden • " + (data.count ?? (data.orders||[]).length) + " Bestellungen";
      render(data);
    } catch (e) {
      el("status").textContent = "Fehler: " + (e.message || e);
      el("orders").innerHTML = '<div class="card"><div class="small">Keine Verbindung. PIN korrekt?</div></div>';
    }
  }

  function start() {
    const saved = localStorage.getItem("cloud9_staff_pin");
    if (saved) el("pin").value = saved;

    el("connect").addEventListener("click", () => {
      localStorage.setItem("cloud9_staff_pin", el("pin").value || "");
      if (timer) clearInterval(timer);
      refresh();
      timer = setInterval(refresh, 2000);
    });

    el("refresh").addEventListener("click", refresh);
    el("onlyNew").addEventListener("change", refresh);
  }

  start();
})();
</script>
</body>
</html>
